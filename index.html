<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WeatherNow Dashboard</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="dashboard-container">
		<header class="search-section">
			<input type="text" id="searchInput" placeholder="Enter city name...">
			<button id="searchBtn">Search</button>
			<button id="unitToggle">°C / °F</button>
		</header>
		<div id="recentSearches" class="recent-searches"></div>
		<section class="current-weather card">
			<h2 id="cityName" class="skeleton skeleton-text">City Name</h2>
			<div class="weather-main">
				<p id="temperature" class="skeleton skeleton-text large-text">--°C</p>
				<p id="weatherDesc" class="skeleton skeleton-text">Description</p>
			</div>	
			<div class="weather-details">
				<p>Humidity: <span id="humidity" class="skeleton skeleton-text">--%</span></p>
				<p>Wind Speed: <span id="windSpeed" class="skeleton skeleton-text">-- km/h</span></p>
				<p>Time: <span id="time" class="skeleton skeleton-text">--:--</span></p>
			</div>	
		</section>

		<section class="forecast-row">
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">🌤️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">🌧️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">☁️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">☀️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">⛈️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">🌥️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
			<div class="forecast-card card">
				<h3 class="day-name skeleton skeleton-text">Day</h3>
				<div class="weather-icon skeleton skeleton-icon">☀️</div>
				<p class="high-low skeleton skeleton-text">H: --° L: --°</p>
			</div>
		</section>
	</div>
	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	<script src="app.js"></script>
</body>
</html>
