<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WeatherNow Dashboard</title>
	<link rel="stylesheet" href="">
</head>

<body>
	<div class="dashboard-container">
		<header class="search-section">
			<input type="text" id="searchInput" placeholder="Enter city name...">
			<button id="searchBtn">Search</button>
		</header>
	</div>

	<section class="current-weather-card">
		<h2 id="cityName" class="skeleton-text">City Name</h2>
		<div class="weather-main">
			<p id="temperature" class="sklt sklt-text large-text">--°C</p>
			<p id="weatherDesc" class="sklt sklt-text">Description</p>
		</div>	
		<div class="weather-details">
			<p>Humidity: <span id="humidity" class="sklt sklt-text">--%</span></p>
			<p>Wind Speed: <span id="windSpeed" class="sklt sklt-text">-- km/h</span></p>
			<p>Time: <span id="time" class="sklt sklt-text">--:--</span></p>
		</div>	
	</section>

	<section class="forecast-row">
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">🌤️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">🌧️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">☁️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">☀️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">⛈️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">🌥️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
		<div class="forecast-row card">
			<h3 class="day-name sklt sklt-text">Day</h3>
			<div class="weather-icon sklt sklt-icon">☀️</div>
			<p class="high-low sklt sklt-text">H: --° L: --°</p>
		</div>
	</section>

</body>
<html>
